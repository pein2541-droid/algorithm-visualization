<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .box { fill: #ffffff; stroke: #333; stroke-width: 2; rx: 8; }
    .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #222; }
    .text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
    .line { stroke: #333; stroke-width: 2; }
  </style>
  <!-- Root -->
  <rect class="box" x="480" y="20" width="240" height="50"/>
  <text class="title" x="600" y="52" text-anchor="middle">算法动画学习系统</text>

  <!-- Level 1 -->
  <rect class="box" x="100" y="120" width="260" height="50"/>
  <text class="title" x="230" y="152" text-anchor="middle">用户与认证模块</text>

  <rect class="box" x="420" y="120" width="260" height="50"/>
  <text class="title" x="550" y="152" text-anchor="middle">算法库模块</text>

  <rect class="box" x="740" y="120" width="360" height="50"/>
  <text class="title" x="920" y="152" text-anchor="middle">动画演示模块</text>

  <!-- Lines from root -->
  <line class="line" x1="600" y1="70" x2="230" y2="120"/>
  <line class="line" x1="600" y1="70" x2="550" y2="120"/>
  <line class="line" x1="600" y1="70" x2="920" y2="120"/>

  <!-- Level 2: 用户与认证模块 -->
  <rect class="box" x="40" y="210" width="180" height="50"/>
  <text class="text" x="130" y="240" text-anchor="middle">登录注册 / JWT</text>
  <line class="line" x1="230" y1="170" x2="130" y2="210"/>

  <rect class="box" x="230" y="210" width="180" height="50"/>
  <text class="text" x="320" y="240" text-anchor="middle">权限与状态</text>
  <line class="line" x1="230" y1="170" x2="320" y2="210"/>

  <!-- Level 2: 算法库模块 -->
  <rect class="box" x="360" y="210" width="180" height="50"/>
  <text class="text" x="450" y="240" text-anchor="middle">算法元数据</text>
  <line class="line" x1="550" y1="170" x2="450" y2="210"/>

  <rect class="box" x="550" y="210" width="180" height="50"/>
  <text class="text" x="640" y="240" text-anchor="middle">复杂度与伪代码</text>
  <line class="line" x1="550" y1="170" x2="640" y2="210"/>

  <!-- Level 2: 动画演示模块 -->
  <rect class="box" x="720" y="210" width="200" height="50"/>
  <text class="text" x="820" y="240" text-anchor="middle">状态机驱动</text>
  <line class="line" x1="920" y1="170" x2="820" y2="210"/>

  <rect class="box" x="940" y="210" width="200" height="50"/>
  <text class="text" x="1040" y="240" text-anchor="middle">伪代码同步高亮</text>
  <line class="line" x1="920" y1="170" x2="1040" y2="210"/>

  <rect class="box" x="860" y="290" width="200" height="50"/>
  <text class="text" x="960" y="320" text-anchor="middle">速度/参数可调</text>
  <line class="line" x1="1040" y1="260" x2="960" y2="290"/>

  <!-- Frontend / DevServer / Backend / DB -->
  <rect class="box" x="80" y="380" width="300" height="70"/>
  <text class="title" x="230" y="405" text-anchor="middle">前端（React + Vite + Tailwind）</text>
  <text class="text" x="230" y="430" text-anchor="middle">页面/动画组件/API封装/状态管理</text>

  <rect class="box" x="420" y="380" width="220" height="70"/>
  <text class="title" x="530" y="410" text-anchor="middle">Vite 开发服务器</text>
  <text class="text" x="530" y="435" text-anchor="middle">代理 /api -> 5000</text>

  <rect class="box" x="680" y="380" width="260" height="70"/>
  <text class="title" x="810" y="405" text-anchor="middle">后端（Flask + SQLAlchemy）</text>
  <text class="text" x="810" y="430" text-anchor="middle">路由/认证/服务/模型</text>

  <rect class="box" x="980" y="380" width="140" height="70"/>
  <text class="title" x="1050" y="410" text-anchor="middle">数据库</text>
  <text class="text" x="1050" y="435" text-anchor="middle">SQLite / PostgreSQL</text>

  <line class="line" x1="380" y1="415" x2="420" y2="415"/>
  <line class="line" x1="640" y1="415" x2="680" y2="415"/>
  <line class="line" x1="940" y1="415" x2="980" y2="415"/>
</svg>

